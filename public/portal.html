<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besta — Welcome</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold2: #e8c87a;
    --gold3: #f5dfa0;
    --bg: #060502;
    --card-bg: rgba(20, 16, 12, 0.4);
    --glass-border: rgba(201, 168, 76, 0.15);
    --glass-shine: rgba(201, 168, 76, 0.05);
    --text: #f7f0e3;
    --text-dim: #a5937a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* --- Couture Mesh Background --- */
  .mesh-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: #060502;
    overflow: hidden;
  }

  .mesh-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    filter: blur(80px);
    opacity: 0.6;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    mix-blend-mode: screen;
    opacity: 0.4;
    animation: blobMove 25s infinite alternate ease-in-out;
  }

  @keyframes blobMove {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30%, 20%) scale(1.3); }
  }

  .wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }

  /* Logo & Brand */
  .orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: conic-gradient(from 180deg at 50% 50%, #c9a84c, #efd695, #c9a84c);
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    box-shadow: 0 0 50px rgba(201, 168, 76, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.4);
    animation: floatingOrb 4s ease-in-out infinite;
  }

  @keyframes floatingOrb {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.05); }
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 12px;
    background: linear-gradient(to bottom, #f5dfa0, #c9a84c);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }

  .role-heading {
    margin: 48px 0 32px;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .role-heading::before, .role-heading::after {
    content: ''; flex: 1; height: 1px; background: rgba(201, 168, 76, 0.15);
  }

  /* Roles Grid */
  .roles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .role-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px 20px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
  }

  .role-card:hover {
    border-color: rgba(201, 168, 76, 0.4);
    background: rgba(201, 168, 76, 0.05);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
  }

  .role-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, var(--glass-shine) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.5s;
  }

  .role-card:hover::after { opacity: 1; }

  .role-icon {
    font-size: 44px;
    margin-bottom: 16px;
    display: block;
    transition: transform 0.5s;
    transform: translateZ(20px);
  }

  .role-card:hover .role-icon { transform: translateZ(40px) scale(1.1); }

  .role-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--gold2);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .role-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    font-weight: 300;
  }

  /* Selection Decoration */
  .role-card.customer { border-color: rgba(16, 185, 129, 0.15); }
  .role-card.customer:hover { border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 30px 60px rgba(16, 185, 129, 0.1); }

  .res-btn {
    position: absolute; bottom: 40px; right: 40px;
    padding: 16px 28px; border-radius: 50px; background: rgba(201, 168, 76, 0.15);
    border: 1px solid var(--gold); color: var(--gold3); font-weight: 600;
    cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: 10px; z-index: 50;
  }
  .res-btn:hover { background: var(--gold); color: #000; transform: translateY(-3px); box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3); }

  .res-modal {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px;
  }
  .res-modal.show { display: flex; }
  .res-card {
    background: #0D0907; border: 1px solid var(--glass-border); border-radius: 32px;
    padding: 40px; width: 100%; max-width: 480px; text-align: center;
  }
  .res-form { text-align: left; margin-top: 24px; }
  .fg { margin-bottom: 18px; }
  .fg label { display: block; font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .fg input {
    width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; outline: none; transition: border-color 0.3s;
  }
  .fg input:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
  .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .res-submit {
    width: 100%; padding: 18px; border-radius: 16px; background: var(--gold); color: #000;
    font-weight: 700; border: none; cursor: pointer; transition: all 0.3s; margin-top: 10px;
  }
  .res-submit:hover { box-shadow: 0 10px 30px rgba(201,168,76,0.3); transform: translateY(-2px); }
  .res-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* PIN Modal Overhaul */
  .pin-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px;
  }
  .pin-overlay.show { display: flex; }

  .pin-card {
    background: rgba(20, 16, 12, 0.7);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 48px 40px;
    width: 100%; max-width: 400px; text-align: center;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
    position: relative; overflow: hidden;
  }

  .pin-icon { font-size: 52px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.4)); }
  .pin-role {
    font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700;
    background: linear-gradient(to bottom, #f5dfa0, #c9a84c);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .pin-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim); margin: 6px 0 32px; }

  /* Dots */
  .pin-dots { display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid rgba(201, 168, 76, 0.3); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .pin-dot.filled { background: var(--gold2); border-color: var(--gold2); transform: scale(1.2); box-shadow: 0 0 15px var(--gold); }

  /* Numpad Couture */
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .num-btn {
    height: 64px; border-radius: 16px; border: 1px solid rgba(201, 168, 76, 0.1);
    background: rgba(255, 255, 255, 0.03); color: var(--text); font-size: 22px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .num-btn:hover { background: rgba(201, 168, 76, 0.1); border-color: rgba(201, 168, 76, 0.3); transform: translateY(-2px); }
  .num-btn:active { transform: scale(0.95); }
  .num-btn.submit {
    background: linear-gradient(135deg, #c9a84c, #efd695); color: #000;
    font-size: 16px; font-weight: 700; border-color: transparent;
  }
  .num-btn.submit:hover { box-shadow: 0 10px 30px rgba(201, 168, 76, 0.4); }

  .pin-cancel {
    background: transparent; border: none; color: var(--text-dim); font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 10px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 60px 20px; justify-content: flex-start; }
    .roles { grid-template-columns: 1fr; gap: 16px; width: 100%; max-width: 320px; margin: 0 auto; }
    .brand { font-size: 40px; letter-spacing: 8px; }
    .brand-sub { font-size: 8px; letter-spacing: 4px; }
    .pin-card { padding: 40px 20px; border-radius: 24px; }
    .num-btn { height: 56px; font-size: 20px; }
  }
  @media(max-width: 480px) {
    .brand {
      font-size: 38px;
      letter-spacing: 8px;
    }
    .roles {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="mesh-bg">
  <canvas class="mesh-canvas" id="meshCanvas"></canvas>
  <div class="blob" style="width:500px; height:500px; background:rgba(201, 168, 76, 0.12); top:-10%; left:-10%;"></div>
  <div class="blob" style="width:400px; height:400px; background:rgba(232, 200, 122, 0.08); bottom:-5%; right:-5%; animation-delay:-5s;"></div>
</div>

<div class="wrap">
  <div class="orb">🌸</div>
  <div class="brand">BESTA</div>
  <div class="brand-sub">The Indian Kitchen</div>

  <div class="role-heading">✦ Select Your Domain ✦</div>

  <div class="roles">
    <div class="role-card" data-tilt data-tilt-max="10" onclick="openPin('waiter')">
      <span class="role-icon">🛎️</span>
      <div class="role-name">Waiter</div>
      <div class="role-desc">Elevate the digital service experience</div>
    </div>
    <div class="role-card" data-tilt data-tilt-max="10" onclick="openPin('kitchen')">
      <span class="role-icon">🍳</span>
      <div class="role-name">Kitchen</div>
      <div class="role-desc">Orchestrate culinary excellence</div>
    </div>
    <div class="role-card" data-tilt data-tilt-max="10" onclick="openPin('admin')">
      <span class="role-icon">⚙️</span>
      <div class="role-name">Admin</div>
      <div class="role-desc">Govern the Besta restaurant universe      </div>
    </div>

    <button class="res-btn" onclick="openRes()">
      <i class="fas fa-calendar-check"></i> Book a Table
    </button>
  </div>

  <div class="res-modal" id="resModal">
    <div class="res-card">
      <div style="font-size:42px; margin-bottom:10px;">🌸</div>
      <h2 style="font-family:'Cormorant Garamond',serif; font-size:32px; color:var(--gold2)">Reserve a Table</h2>
      <p style="font-size:13px; color:var(--text-dim)">Join us for an authentic Indian experience</p>
      
      <form class="res-form" onsubmit="handleRes(event)">
        <div class="fg">
          <label>Full Name</label>
          <input type="text" id="resName" required placeholder="Enter your name">
        </div>
        <div class="fg">
          <label>Phone Number</label>
          <input type="tel" id="resPhone" required placeholder="Enter phone number">
        </div>
        <div class="res-grid">
          <div class="fg">
            <label>Guests</label>
            <input type="number" id="resGuests" value="2" min="1" max="20" required>
          </div>
          <div class="fg">
            <label>Time</label>
            <input type="time" id="resTime" required>
          </div>
        </div>
        <div class="fg">
          <label>Date</label>
          <input type="date" id="resDate" required>
        </div>
        <button type="submit" class="res-submit" id="resBtn">Confirm Booking</button>
        <button type="button" class="back-btn" style="margin-top:15px; width:100%; padding:10px; background:transparent; border:none; color:var(--text-dim); cursor:pointer;" onclick="closeRes()">Cancel</button>
      </form>
    </div>
  </div>
</div>

<!-- PIN Modal -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-card">
    <div class="pin-icon" id="pinIcon">🔐</div>
    <div class="pin-role" id="pinRoleName">—</div>
    <div class="pin-sub">Enter Your PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="numpad">
      <button class="num-btn" onclick="pressKey('1')">1</button>
      <button class="num-btn" onclick="pressKey('2')">2</button>
      <button class="num-btn" onclick="pressKey('3')">3</button>
      <button class="num-btn" onclick="pressKey('4')">4</button>
      <button class="num-btn" onclick="pressKey('5')">5</button>
      <button class="num-btn" onclick="pressKey('6')">6</button>
      <button class="num-btn" onclick="pressKey('7')">7</button>
      <button class="num-btn" onclick="pressKey('8')">8</button>
      <button class="num-btn" onclick="pressKey('9')">9</button>
      <button class="num-btn del" onclick="pressKey('del')">⌫</button>
      <button class="num-btn" onclick="pressKey('0')">0</button>
      <button class="num-btn submit" onclick="submitPin()">✓</button>
    </div>
    <button class="pin-cancel" onclick="closePin()">← Back</button>
  </div>
</div>

<!-- Success -->
<div class="success-overlay" id="successOverlay">✅</div>

<script>

// ── PIN modal ──
const ICONS = { waiter:'🛎️', kitchen:'🍳', admin:'⚙️' };
const NAMES = { waiter:'Waiter', kitchen:'Kitchen', admin:'Admin' };
let currentRole = null;
let pin = '';

function openPin(role) {
  currentRole = role;
  pin = '';
  document.getElementById('pinIcon').textContent = ICONS[role];
  document.getElementById('pinRoleName').textContent = NAMES[role] + ' Login';
  document.getElementById('pinError').textContent = '';
  updateDots();
  document.getElementById('pinOverlay').classList.add('show');
}
function closePin() {
  document.getElementById('pinOverlay').classList.remove('show');
  pin = '';
  updateDots();
}
function updateDots() {
  for (let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pin.length);
  }
}
function shakeCard() {
  const c = document.querySelector('.pin-card');
  c.style.animation = 'none';
  c.offsetHeight;
  c.style.animation = 'shake 0.4s ease';
}
function pressKey(k) {
  if (k === 'del') { pin = pin.slice(0,-1); }
  else if (pin.length < 4) { pin += k; }
  updateDots();
  document.getElementById('pinError').textContent = '';
  if (pin.length === 4) submitPin();
}
async function submitPin() {
  if (pin.length < 4) return;
  try {
    const res = await fetch('/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: currentRole, pin })
    });
    const data = await res.json();
    if (data.ok) {
      // Store token in sessionStorage
      sessionStorage.setItem('bestaRole', data.role);
      sessionStorage.setItem('bestaToken', data.token);
      // Animate success
      document.getElementById('successOverlay').classList.add('show');
      const dest = currentRole === 'waiter' ? '/waiter'
                 : currentRole === 'kitchen' ? '/kitchen'
                 : '/admin';
      setTimeout(() => window.location.href = dest, 600);
    } else {
      document.getElementById('pinError').textContent = '✗ Wrong PIN — try again';
      shakeCard();
      pin = '';
      updateDots();
    }
  } catch(e) {
    document.getElementById('pinError').textContent = 'Connection error. Retry.';
    pin = ''; updateDots();
  }
}

// Reservation Logic
function openRes() { document.getElementById('resModal').classList.add('show'); }
function closeRes() { document.getElementById('resModal').classList.remove('show'); }

async function handleRes(e) {
  e.preventDefault();
  const btn = document.getElementById('resBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  const data = {
    customer_name: document.getElementById('resName').value,
    phone: document.getElementById('resPhone').value,
    guests: document.getElementById('resGuests').value,
    time: document.getElementById('resTime').value,
    date: document.getElementById('resDate').value
  };

  try {
    const r = await fetch('/api/reservations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (r.ok) {
      alert('🌸 Reservation Confirmed! We look forward to seeing you.');
      closeRes();
    } else {
      const d = await r.json();
      alert('❌ Error: ' + d.error);
    }
  } catch(e) {
    alert('❌ Connection failed. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirm Booking';
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (!document.getElementById('pinOverlay').classList.contains('show')) return;
  if (e.key === 'Escape') closePin();
  else if (e.key === 'Backspace') pressKey('del');
  else if (e.key === 'Enter') submitPin();
  else if (/^[0-9]$/.test(e.key)) pressKey(e.key);
});

// --- Mesh Logic ---
const canvas = document.getElementById('meshCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.r = Math.random() * 150 + 50;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.color = Math.random() > 0.5 ? 'rgba(201, 168, 76, 0.15)' : 'rgba(232, 200, 122, 0.1)';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < -this.r) this.x = w + this.r;
    if (this.x > w + this.r) this.x = -this.r;
    if (this.y < -this.r) this.y = h + this.r;
    if (this.y > h + this.r) this.y = -this.r;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0, this.color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 15; i++) particles.push(new Particle());

function anim() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(anim);
}
anim();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
</body>
</html>
